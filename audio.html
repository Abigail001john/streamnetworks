<script>
    const TRACKS = [
        { artist: 'Wizkid',          song: 'Essence (ft. Tems)',               url: 'https://audiomack.com/wizkid/song/essence-2' },
        { artist: 'Rema',            song: 'Calm Down',                         url: 'https://audiomack.com/heisrema/song/calm-down-2' },
        { artist: 'Burna Boy',       song: 'Last Last',                         url: 'https://audiomack.com/burna-boy/song/last-last-africa' },
        { artist: 'SugaKing',        song: 'Street Na Stage',                   url: 'https://audiomack.com/sugaking1/song/692c427a73335' },
        { artist: 'Mulla Ray',       song: 'Highway',                           url: 'https://audiomack.com/mulla-ray/song/highway' },
        { artist: 'JTK',             song: 'Jo',                                url: 'https://audiomack.com/jtk-5/song/jo' },
        { artist: 'DJ BabyGolo',     song: 'Nigerian Afrobeat Summer',          url: 'https://audiomack.com/djbabygolo-golo-nation/song/nigerian-afrobeat-summer' },
        { artist: 'Afrobeat Music',  song: 'Feel The Groove',                   url: 'https://audiomack.com/afrobeat-music/song/feel-the-groove' },
        { artist: 'DJ BabyGolo',     song: 'Afrobeats Night Vibes',             url: 'https://audiomack.com/djbabygolo-golo-nation/song/afrobeats-night-vibes' },
        { artist: 'Afrobeat Music',  song: 'Exclusive Afrobeat Track',          url: 'https://audiomack.com/afrobeat-music/song/exclusive-afrobeat-track' },
        { artist: 'Afrobeat Music',  song: 'Chill Afro Ride',                   url: 'https://audiomack.com/afrobeat-music/song/chill-afro-ride' },
        { artist: 'Afrobeat Music',  song: 'Feel Good Afro',                    url: 'https://audiomack.com/afrobeat-music/song/feel-good-afro' },
        { artist: 'Afrobeat Music',  song: 'National Beat',                     url: 'https://audiomack.com/afrobeat-music/song/national-beat' },
        { artist: 'DJ BabyGolo',     song: 'Weekend Afrobeat',                  url: 'https://audiomack.com/djbabygolo-golo-nation/song/weekend-afrobeat' },
        { artist: 'Afrobeat Music',  song: 'Uptown Afro Vibes',                 url: 'https://audiomack.com/afrobeat-music/song/uptown-afro-vibes' },
        { artist: 'DJ BabyGolo',     song: 'Feel The Afro',                     url: 'https://audiomack.com/djbabygolo-golo-nation/song/feel-the-afro' },
        { artist: 'Saycome',         song: '1 Billion Kuwait',                  url: 'https://audiomack.com/saycome/song/1-billion-kuwait' },
        { artist: 'JaemallyBeatz',   song: 'Libido Afro-fusion Beat 2024',      url: 'https://audiomack.com/jaemallybeatz/song/libido-afro-fusion-type-beat-2024' },
        { artist: 'Naija Afrobeat',  song: 'Search Picks',                      url: 'https://audiomack.com/search?q=naija%20afrobeat' },
        { artist: 'Naija Hits',      song: 'Search Picks',                      url: 'https://audiomack.com/search?q=naija%20hits' },
    ];

    function getDayIndex() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const dayOfYear = Math.floor((now - start) / 86400000);
        return dayOfYear % 20;
    }

    function getEmbedUrl(trackUrl) {
        // Audiomack embed: replace audiomack.com with audiomack.com/player/
        // Format: https://audiomack.com/player/artist/song/slug
        const path = trackUrl.replace('https://audiomack.com/', '');
        return `https://audiomack.com/player/${path}`;
    }

    function loadTrack(idx) {
        const track = TRACKS[idx];
        document.getElementById('npArtist').textContent = track.artist;
        document.getElementById('npSong').textContent = track.song;
        document.getElementById('audioFrame').src = getEmbedUrl(track.url);

        document.querySelectorAll('.track-item').forEach((el, i) => {
            el.classList.toggle('active', i === idx);
        });
    }

    function init() {
        const todayIdx = getDayIndex();

        document.getElementById('dayPill').textContent = `Day ${todayIdx + 1}`;
        document.getElementById('dayText').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

        const tracklist = document.getElementById('tracklist');
        TRACKS.forEach((track, i) => {
            const el = document.createElement('div');
            el.className = 'track-item' + (i === todayIdx ? ' active' : '');
            el.innerHTML = `
                <div class="track-num">${i === todayIdx ? '<i class="fas fa-volume-up" style="font-size:12px;"></i>' : i + 1}</div>
                <div class="track-info">
                    <div class="track-name">${track.song}</div>
                    <div class="track-artist">${track.artist}</div>
                </div>
                ${i === todayIdx ? '<span class="track-today">TODAY</span>' : ''}
            `;
            el.addEventListener('click', () => loadTrack(i));
            tracklist.appendChild(el);
        });

        loadTrack(todayIdx);
    }

    init();
</script>
