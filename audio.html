<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio – FW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #0a0e1a;
            color: #ffffff;
            overflow-x: hidden;
        }
        .container {
            width: 100%; max-width: 480px;
            margin: 0 auto;
            background-color: #0a0e1a;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* TOP NAV */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0;
            max-width: 480px; margin: 0 auto; width: 100%;
            height: 60px;
            background: rgba(10,14,26,0.95);
            backdrop-filter: blur(12px);
            display: flex; align-items: center;
            padding: 0 16px; gap: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none; color: #fff;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
            transition: background 0.2s;
            text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .nav-title { font-size: 17px; font-weight: 700; flex: 1; }
        .nav-badge {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: #fff; font-size: 11px; font-weight: 700;
            padding: 4px 10px; border-radius: 20px;
        }

        /* MAIN */
        .main-content {
            margin-top: 60px;
            padding: 20px 16px 100px;
            flex: 1;
        }

        /* DAY LABEL */
        .day-label {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 20px;
        }
        .day-pill {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: #fff; font-size: 12px; font-weight: 700;
            padding: 5px 14px; border-radius: 20px;
        }
        .day-text { font-size: 13px; color: rgba(255,255,255,0.5); }

        /* NOW PLAYING CARD */
        .now-playing-card {
            background: linear-gradient(135deg, #1a1040 0%, #150d35 100%);
            border-radius: 24px;
            padding: 24px 20px 20px;
            margin-bottom: 20px;
            box-shadow: 0 12px 40px rgba(139,92,246,0.2);
            border: 1px solid rgba(139,92,246,0.2);
            position: relative;
            overflow: hidden;
        }
        .now-playing-card::before {
            content: '';
            position: absolute; top: -40px; right: -40px;
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(139,92,246,0.3) 0%, transparent 70%);
            border-radius: 50%;
        }
        .np-label {
            font-size: 11px; font-weight: 700;
            color: #a78bfa; text-transform: uppercase;
            letter-spacing: 1.5px; margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .np-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #a78bfa;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50% { opacity:0.5; transform:scale(0.8); }
        }
        .np-artist { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .np-song { font-size: 15px; color: rgba(255,255,255,0.6); margin-bottom: 20px; }

        /* AUDIOMACK EMBED */
        .audio-embed {
            width: 100%; border-radius: 14px;
            overflow: hidden; background: #1a1a2e;
            min-height: 200px;
        }
        .audio-embed iframe {
            width: 100%; border: none; display: block;
            border-radius: 14px;
        }

        /* RECYCLE NOTICE */
        .recycle-notice {
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.25);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px;
        }
        .recycle-icon { font-size: 22px; }
        .recycle-text { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; }
        .recycle-text strong { color: #fff; }

        /* TRACKLIST */
        .section-title {
            font-size: 14px; font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 14px;
        }
        .tracklist { display: flex; flex-direction: column; gap: 10px; }
        .track-item {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex; align-items: center; gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid transparent;
        }
        .track-item:hover, .track-item.active {
            background: rgba(139,92,246,0.12);
            border-color: #8b5cf6;
        }
        .track-num {
            width: 30px; height: 30px; border-radius: 50%;
            background: rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
            color: rgba(255,255,255,0.5); flex-shrink: 0;
        }
        .track-item.active .track-num { background: #8b5cf6; color: #fff; }
        .track-item.active .track-num i { display: block; }
        .track-info { flex: 1; min-width: 0; }
        .track-name {
            font-size: 13px; font-weight: 600;
            color: #fff; margin-bottom: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .track-artist { font-size: 11px; color: rgba(255,255,255,0.4); }
        .track-today {
            font-size: 10px; font-weight: 700;
            background: #8b5cf6; color: #fff;
            padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            max-width: 480px; margin: 0 auto;
            height: 72px;
            background: rgba(10,14,26,0.97);
            backdrop-filter: blur(12px);
            display: flex; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 4px; text-decoration: none;
            color: rgba(255,255,255,0.4);
            font-size: 10px; font-weight: 500;
            transition: color 0.2s; padding: 8px 0;
        }
        .nav-item.active { color: #8b5cf6; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>
<div class="container">

    <!-- TOP NAV -->
    <nav class="top-nav">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="nav-title">🎵 Daily Audio</div>
        <span class="nav-badge">EARN ₦500</span>
    </nav>

    <!-- MAIN -->
    <div class="main-content">

        <div class="day-label">
            <span class="day-pill" id="dayPill">Day 1</span>
            <span class="day-text" id="dayText">Today's featured track</span>
        </div>

        <!-- NOW PLAYING CARD -->
        <div class="now-playing-card">
            <div class="np-label"><span class="np-dot"></span> Now Playing</div>
            <div class="np-artist" id="npArtist">Loading…</div>
            <div class="np-song" id="npSong"></div>
            <div class="audio-embed" id="audioEmbed">
                <iframe id="audioFrame" src="" height="200" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="border-radius:14px;"></iframe>
            </div>
        </div>

        <!-- RECYCLE NOTICE -->
        <div class="recycle-notice">
            <span class="recycle-icon">🔄</span>
            <div class="recycle-text">
                <strong>Daily Rotation Active</strong><br>
                New track every day. After 20 days, the playlist recycles automatically.
            </div>
        </div>

        <!-- TRACKLIST -->
        <div class="section-title">All 20 Tracks</div>
        <div class="tracklist" id="tracklist"></div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <div class="nav-icon"><i class="fas fa-home"></i></div>
            <span>Home</span>
        </a>
        <a href="wish-hub.html" class="nav-item">
            <div class="nav-icon"><i class="fas fa-star"></i></div>
            <span>Wish Hub</span>
        </a>
        <a href="earn.html" class="nav-item">
            <div class="nav-icon"><i class="fas fa-coins"></i></div>
            <span>Earn</span>
        </a>
        <a href="video.html" class="nav-item">
            <div class="nav-icon"><i class="fas fa-play"></i></div>
            <span>Video</span>
        </a>
        <a href="audio.html" class="nav-item active">
            <div class="nav-icon"><i class="fas fa-headphones"></i></div>
            <span>Audio</span>
        </a>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
    // YouTube video IDs — embeds work everywhere, no blocking
    const TRACKS = [
        { artist: 'Wizkid',         song: 'Essence ft. Tems',              vid: 'WcLJZAkmI9o' },
        { artist: 'Rema',           song: 'Calm Down',                     vid: 'Os6gLKIaWaY' },
        { artist: 'Burna Boy',      song: 'Last Last',                     vid: 'hJN7fxMNRO0' },
        { artist: 'Asake',          song: 'Organise',                      vid: 'xYlPbkSzFZI' },
        { artist: 'Davido',         song: 'Stand Strong ft. Mavins',       vid: '3gLIE0QBKQM' },
        { artist: 'Fireboy DML',    song: 'Peru',                          vid: 'g6aQeF6ZJXI' },
        { artist: 'Omah Lay',       song: 'Understand',                    vid: 'X4KCf-i5lu0' },
        { artist: 'Ckay',           song: 'Love Nwantiti',                 vid: '6JqEJMnbyW4' },
        { artist: 'Ayra Starr',     song: '19 & Dangerous',                vid: 'cbqG5RRqkXs' },
        { artist: 'Kizz Daniel',    song: 'Buga ft. Tekno',                vid: 'O_Fy58e9T3M' },
        { artist: 'Tems',           song: 'Free Mind',                     vid: 'jBQKSy3Ee2U' },
        { artist: 'Zinoleesky',     song: 'Loving You',                    vid: 'GCxaHnVe-PM' },
        { artist: 'Portable',       song: 'Zazu Zeh',                      vid: 'aPZElrXFbKY' },
        { artist: 'Olamide',        song: 'Infinity ft. Omah Lay',         vid: 'hiqn-Dmhyps' },
        { artist: 'Joeboy',         song: 'Alcohol',                       vid: 'xoT1hWTTlgw' },
        { artist: 'Tiwa Savage',    song: 'Somebody's Son',               vid: 'jExQxU3s-W4' },
        { artist: 'Simi',           song: 'Duduke',                        vid: 'kNNwPGBg0GE' },
        { artist: 'Flavour',        song: 'Shake',                         vid: 'FalCvvbJuMk' },
        { artist: 'Pheelz',         song: 'Finesse ft. BNXN',              vid: 'M8AuvuuOhxA' },
        { artist: 'BNXN',           song: 'Gwara Gwara',                   vid: 'NpZlVCcPVbQ' },
    ];

    const AUDIO_EARN_AMOUNT = 500;
    const LISTEN_REQUIRED_SECONDS = 60; // 60s listening required before claim enables
    let currentUserId = null;
    let taskAlreadyDone = false;
    let listenTimer = null;
    let listenSeconds = 0;
    let listenStarted = false;

    function todayStr() { return new Date().toISOString().slice(0,10); }
    function fmt(n) { return '₦' + Number(n||0).toLocaleString('en-NG',{minimumFractionDigits:2,maximumFractionDigits:2}); }

    function showToast(msg, type='success') {
        let c = document.getElementById('audioToastContainer');
        if(!c) {
            c = document.createElement('div');
            c.id = 'audioToastContainer';
            c.style.cssText = 'position:fixed;top:70px;right:14px;z-index:9999;max-width:300px;';
            document.body.appendChild(c);
        }
        const t = document.createElement('div');
        const color = type==='success' ? '#8b5cf6' : '#ef4444';
        t.style.cssText = `background:#1a1040;color:#fff;border-left:4px solid ${color};border-radius:10px;padding:12px 16px;margin-bottom:10px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.5);`;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 4000);
    }

    function getDayIndex() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const dayOfYear = Math.floor((now - start) / 86400000);
        return dayOfYear % 20;
    }

    function getEmbedUrl(track) {
        // YouTube embed — works everywhere, no iframe blocking
        return `https://www.youtube.com/embed/${track.vid}?autoplay=0&rel=0&modestbranding=1`;
    }

    function startListenTimer() {
        if(listenTimer || taskAlreadyDone) return;
        listenStarted = true;
        listenTimer = setInterval(() => {
            listenSeconds++;
            updateClaimButton();
        }, 1000);
    }

    function updateClaimButton() {
        const btn = document.getElementById('audioClaimBtn');
        if(!btn || taskAlreadyDone) return;
        const remaining = Math.max(0, LISTEN_REQUIRED_SECONDS - listenSeconds);
        if(remaining > 0) {
            btn.textContent = `⏳ Listen for ${remaining}s more to claim...`;
            btn.disabled = true;
        } else {
            btn.textContent = `✅ Completed — Claim ${fmt(AUDIO_EARN_AMOUNT)}`;
            btn.disabled = false;
            btn.style.background = 'linear-gradient(135deg,#8b5cf6,#6d28d9)';
            btn.style.cursor = 'pointer';
            if(listenTimer) { clearInterval(listenTimer); listenTimer = null; }
        }
    }

    function showEarnPanel(alreadyDone, completedAt) {
        let panel = document.getElementById('earnPanel');
        if(!panel) {
            panel = document.createElement('div');
            panel.id = 'earnPanel';
            panel.style.cssText = 'background:linear-gradient(135deg,#1a1040,#150d35);border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid rgba(139,92,246,0.3);';
            // Insert after now-playing card
            const nowPlaying = document.querySelector('.now-playing-card');
            nowPlaying.parentNode.insertBefore(panel, nowPlaying.nextSibling);
        }

        if(alreadyDone) {
            taskAlreadyDone = true;
            const completedTime = new Date(completedAt).getTime();
            const unlockTime = completedTime + 86400000;

            function renderCooldown() {
                const diff = Math.max(0, Math.floor((unlockTime - Date.now()) / 1000));
                const h = String(Math.floor(diff/3600)).padStart(2,'0');
                const m = String(Math.floor((diff%3600)/60)).padStart(2,'0');
                const s = String(diff%60).padStart(2,'0');
                panel.innerHTML = `
                    <div style="text-align:center;">
                        <div style="font-size:32px;margin-bottom:8px;">✅</div>
                        <div style="font-size:16px;font-weight:700;color:#a78bfa;margin-bottom:6px;">Completed!</div>
                        <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:14px;">You earned ${fmt(AUDIO_EARN_AMOUNT)} for listening today.</div>
                        <div style="background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);border-radius:12px;padding:14px;">
                            <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px;">⏱ Next audio unlocks in</div>
                            <div id="audioCountdown" style="font-size:22px;font-weight:800;color:#a78bfa;font-variant-numeric:tabular-nums;">${diff===0?'Unlocked!':h+':'+m+':'+s}</div>
                        </div>
                        <a href="earn.html" style="display:block;margin-top:14px;background:rgba(255,255,255,0.08);color:#fff;border-radius:10px;padding:12px;font-size:13px;font-weight:600;text-decoration:none;text-align:center;">← Back to Earn</a>
                    </div>`;
                if(diff > 0) setTimeout(()=>{ const el=document.getElementById('audioCountdown'); if(el) renderCooldown(); }, 1000);
            }
            renderCooldown();
        } else {
            panel.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                    <div>
                        <div style="font-size:13px;font-weight:700;color:#fff;">🎵 Listen & Earn</div>
                        <div style="font-size:12px;color:rgba(255,255,255,0.5);">Listen to today's track to earn</div>
                    </div>
                    <div style="font-size:20px;font-weight:800;color:#a78bfa;">${fmt(AUDIO_EARN_AMOUNT)}</div>
                </div>
                <button id="audioClaimBtn" disabled
                    style="width:100%;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);border:none;border-radius:10px;padding:14px;font-size:13px;font-weight:600;cursor:not-allowed;font-family:inherit;transition:all 0.3s;">
                    ⏳ Start listening to unlock reward...
                </button>
                <div style="margin-top:10px;font-size:11px;color:rgba(255,255,255,0.3);text-align:center;">Press play above, then your reward unlocks automatically</div>`;

            // Timer starts when user clicks a track (handled in loadTrack)
            // Also auto-start after 5s in case the video autoplays
            setTimeout(() => {
                if(!listenStarted && !taskAlreadyDone) {
                    startListenTimer();
                    updateClaimButton();
                }
            }, 5000);

            document.getElementById('audioClaimBtn').addEventListener('click', claimAudioEarning);
        }
    }

    async function claimAudioEarning() {
        const btn = document.getElementById('audioClaimBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Processing...';

        try {
            const since24h = new Date(Date.now() - 86400000).toISOString();
            const {data:ex} = await _supabase.from('daily_completions').select('id')
                .eq('user_id', currentUserId).eq('task_type','daily_audio').gte('created_at',since24h).maybeSingle();
            if(ex) {
                showToast('Already claimed today!');
                showEarnPanel(true, ex.created_at || new Date().toISOString());
                return;
            }

            const now = new Date().toISOString();
            await _supabase.from('daily_completions').insert({
                user_id: currentUserId, task_type: 'daily_audio',
                completed_date: todayStr(), created_at: now
            });
            await _supabase.from('transactions').insert({
                user_id: currentUserId, type: 'daily_task',
                description: 'Daily reward: Audio listen', amount: AUDIO_EARN_AMOUNT, created_at: now
            });
            const {data:w} = await _supabase.from('wallets').select('task_earnings').eq('user_id',currentUserId).maybeSingle();
            await _supabase.from('wallets').upsert({
                user_id: currentUserId,
                task_earnings: (w?.task_earnings||0) + AUDIO_EARN_AMOUNT,
                updated_at: now
            },{onConflict:'user_id'});

            showToast(`🎉 You earned ${fmt(AUDIO_EARN_AMOUNT)} for listening!`);
            showEarnPanel(true, now);

        } catch(err) {
            console.error(err);
            btn.disabled = false;
            btn.textContent = `✅ Completed — Claim ${fmt(AUDIO_EARN_AMOUNT)}`;
            showToast('Something went wrong. Try again.', 'error');
        }
    }

    function loadTrack(idx) {
        const track = TRACKS[idx];
        document.getElementById('npArtist').textContent = track.artist;
        document.getElementById('npSong').textContent = track.song;

        const frame = document.getElementById('audioFrame');
        // YouTube embed — guaranteed to play
        frame.src = getEmbedUrl(track);
        frame.style.display = 'block';

        // Remove any old fallback
        const old = document.getElementById('audioFallback');
        if(old) old.remove();

        document.querySelectorAll('.track-item').forEach((el, i) => {
            el.classList.toggle('active', i === idx);
        });

        // Start listen timer when user clicks a track
        if(!listenStarted && !taskAlreadyDone) {
            startListenTimer();
            updateClaimButton();
        }
    }

    async function init() {
        const todayIdx = getDayIndex();

        document.getElementById('dayPill').textContent = `Day ${todayIdx + 1}`;
        document.getElementById('dayText').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

        const tracklist = document.getElementById('tracklist');
        TRACKS.forEach((track, i) => {
            const el = document.createElement('div');
            el.className = 'track-item' + (i === todayIdx ? ' active' : '');
            el.innerHTML = `
                <div class="track-num">${i === todayIdx ? '<i class="fas fa-volume-up" style="font-size:12px;"></i>' : i + 1}</div>
                <div class="track-info">
                    <div class="track-name">${track.song}</div>
                    <div class="track-artist">${track.artist}</div>
                </div>
                ${i === todayIdx ? '<span class="track-today">TODAY</span>' : ''}
            `;
            el.addEventListener('click', () => loadTrack(i));
            tracklist.appendChild(el);
        });

        loadTrack(todayIdx);

        // Auth & check completion
        try {
            const result = await requireAuth('approved');
            if(!result) return;
            currentUserId = result.profile.id;

            const since24h = new Date(Date.now() - 86400000).toISOString();
            const {data:completion} = await _supabase.from('daily_completions').select('created_at')
                .eq('user_id', currentUserId).eq('task_type','daily_audio').gte('created_at',since24h)
                .order('created_at',{ascending:false}).limit(1).maybeSingle();

            if(completion) {
                showEarnPanel(true, completion.created_at);
            } else {
                showEarnPanel(false, null);
            }
        } catch(e) {
            console.error('Auth/check error:', e);
            showEarnPanel(false, null);
        }
    }

    init();
</script>
</body>
</html>
