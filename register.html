<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — App</title>
  <link rel="icon" href="favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
      color: #fff;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-wrap img { height: 48px; object-fit: contain; }
    .logo-wrap h1 { font-size: 22px; font-weight: 700; margin-top: 10px; }
    .logo-wrap p { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 4px; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .5px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 7px;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 14px;
      pointer-events: none;
    }
    .input-wrap .toggle-pw {
      left: unset;
      right: 14px;
      pointer-events: all;
      cursor: pointer;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"],
    select {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 13px 14px 13px 42px;
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    select { appearance: none; }
    input::placeholder { color: rgba(255,255,255,0.3); }
    input:focus, select:focus {
      border-color: #4fd1c5;
      box-shadow: 0 0 0 3px rgba(79,209,197,0.18);
    }
    input.error { border-color: #fc8181; }

    .field-error {
      font-size: 11.5px;
      color: #fc8181;
      margin-top: 5px;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      margin-top: 8px;
    }
    .btn:hover { opacity: .9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      background: linear-gradient(135deg, #4fd1c5, #38b2ac);
      color: #0f2027;
    }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .divider {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin: 20px 0 16px;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .login-link {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
    }
    .login-link a { color: #4fd1c5; text-decoration: none; font-weight: 600; }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    .alert-error { background: rgba(252,129,129,0.15); border: 1px solid rgba(252,129,129,0.4); color: #fc8181; }
    .alert-success { background: rgba(79,209,197,0.15); border: 1px solid rgba(79,209,197,0.4); color: #4fd1c5; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0f2027;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    @media (max-width: 480px) {
      .card { padding: 30px 20px; }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <img src="logo.png" alt="Logo"/>
    <h1>Create Account</h1>
    <p>Sign up to get started — it's free</p>
  </div>

  <div class="alert alert-error" id="alertError"></div>
  <div class="alert alert-success" id="alertSuccess"></div>

  <form id="registerForm" novalidate>
    <div class="two-col">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="fullName" placeholder="John Doe" autocomplete="name"/>
        </div>
        <div class="field-error" id="errFullName">Please enter your full name.</div>
      </div>
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <i class="fas fa-at"></i>
          <input type="text" id="username" placeholder="johndoe" autocomplete="username"/>
        </div>
        <div class="field-error" id="errUsername">Username is required.</div>
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field-error" id="errEmail">Please enter a valid email.</div>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <div class="input-wrap">
        <i class="fas fa-phone"></i>
        <input type="tel" id="phone" placeholder="+234 800 000 0000" autocomplete="tel"/>
      </div>
      <div class="field-error" id="errPhone">Phone number is required.</div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
        <i class="fas fa-eye toggle-pw" id="togglePw"></i>
      </div>
      <div class="field-error" id="errPassword">Password must be at least 8 characters.</div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password"/>
        <i class="fas fa-eye toggle-pw" id="togglePw2"></i>
      </div>
      <div class="field-error" id="errConfirm">Passwords do not match.</div>
    </div>

    <button class="btn btn-primary" type="submit" id="submitBtn">
      Create Account
    </button>
  </form>

  <div class="divider">or</div>
  <div class="login-link">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<!-- Supabase CDN must load BEFORE any script that uses _supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

<script>
  // Toggle password visibility (runs after DOM and Supabase are both ready)
  document.getElementById('togglePw').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const isText = pw.type === 'text';
    pw.type = isText ? 'password' : 'text';
    this.className = isText ? 'fas fa-eye toggle-pw' : 'fas fa-eye-slash toggle-pw';
  });
  document.getElementById('togglePw2').addEventListener('click', function() {
    const pw = document.getElementById('confirmPassword');
    const isText = pw.type === 'text';
    pw.type = isText ? 'password' : 'text';
    this.className = isText ? 'fas fa-eye toggle-pw' : 'fas fa-eye-slash toggle-pw';
  });

  function showError(id, inputId) {
    document.getElementById(id).style.display = 'block';
    if (inputId) document.getElementById(inputId).classList.add('error');
  }
  function clearErrors() {
    document.querySelectorAll('.field-error').forEach(el => el.style.display = 'none');
    document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
  }
  function showAlert(type, msg) {
    const el = document.getElementById(type === 'error' ? 'alertError' : 'alertSuccess');
    el.textContent = msg;
    el.style.display = 'block';
    if (type !== 'success') setTimeout(() => el.style.display = 'none', 5000);
  }

  document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearErrors();
    document.getElementById('alertError').style.display = 'none';
    document.getElementById('alertSuccess').style.display = 'none';

    const fullName = document.getElementById('fullName').value.trim();
    const username = document.getElementById('username').value.trim().toLowerCase();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    let valid = true;
    if (!fullName) { showError('errFullName', 'fullName'); valid = false; }
    if (!username) { showError('errUsername', 'username'); valid = false; }
    if (!email || !/\S+@\S+\.\S+/.test(email)) { showError('errEmail', 'email'); valid = false; }
    if (!phone) { showError('errPhone', 'phone'); valid = false; }
    if (password.length < 8) { showError('errPassword', 'password'); valid = false; }
    if (password !== confirm) { showError('errConfirm', 'confirmPassword'); valid = false; }
    if (!valid) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creating account…';

    try {
      const { data, error } = await _supabase.auth.signUp({
        email,
        password,
        options: {
          data: { full_name: fullName, username, phone },
          emailRedirectTo: window.location.origin + '/login.html'
        }
      });

      if (error) throw error;

      // Wait briefly for the DB trigger to create the profile row
      await new Promise(r => setTimeout(r, 800));

      // Always go to dashboard — it handles pending/approved state internally
      const user = data.session?.user || data.user;
      if (user) {
        const profile = await getUserProfile(user.id);
        if (profile?.is_admin) { window.location.href = 'admin.html'; return; }
      }
      window.location.href = 'dashboard.html';

    } catch (err) {
      showAlert('error', err.message || 'Registration failed. Please try again.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  });
</script>
</body>
</html>
