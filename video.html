<script>
    const YOUTUBE_LINKS = [
        { url: 'https://www.youtube.com/shorts/P0GIv8x2ofE',  type: 'Short', label: 'FW Short #1' },
        { url: 'https://www.youtube.com/shorts/8sFJsjIUUQE',  type: 'Short', label: 'FW Short #2' },
        { url: 'https://www.youtube.com/shorts/6ENVSeme2H8',  type: 'Short', label: 'FW Short #3' },
        { url: 'https://www.youtube.com/shorts/h1e02qDMya8',  type: 'Short', label: 'FW Short #4' },
        { url: 'https://www.youtube.com/watch?v=pKBF2AzNjA4', type: 'Video', label: 'FW Video #5' },
        { url: 'https://www.youtube.com/shorts/aNf9ErWc4oI',  type: 'Short', label: 'FW Short #6' },
        { url: 'https://www.youtube.com/shorts/tldanEqkb2Y',  type: 'Short', label: 'FW Short #7' },
        { url: 'https://www.youtube.com/shorts/j-GTdLI4Zfc',  type: 'Short', label: 'FW Short #8' },
        { url: 'https://www.youtube.com/watch?v=ZU0f8_C5Pm0', type: 'Video', label: 'FW Video #9' },
        { url: 'https://www.youtube.com/shorts/IhOmjtI7IWY',  type: 'Short', label: 'FW Short #10' },
        { url: 'https://www.youtube.com/shorts/VHIMPwhFn1Q',  type: 'Short', label: 'FW Short #11' },
        { url: 'https://www.youtube.com/shorts/JEHtUnORZKo',  type: 'Short', label: 'FW Short #12' },
        { url: 'https://www.youtube.com/watch?v=U3h1jSgVChc', type: 'Video', label: 'FW Video #13' },
        { url: 'https://www.youtube.com/shorts/CqucCRWeguc',  type: 'Short', label: 'FW Short #14' },
        { url: 'https://www.youtube.com/watch?v=oeqwB8YXHDA', type: 'Video', label: 'FW Video #15' },
        { url: 'https://www.youtube.com/watch?v=uSsHQzveObo', type: 'Video', label: 'FW Video #16' },
        { url: 'https://www.youtube.com/watch?v=R1BHj1eXxRA', type: 'Video', label: 'FW Video #17' },
        { url: 'https://www.youtube.com/watch?v=8Jg3VlxsVqg', type: 'Video', label: 'FW Video #18' },
        { url: 'https://www.youtube.com/watch?v=TgarwUxpem4', type: 'Video', label: 'FW Video #19' },
        { url: 'https://www.youtube.com/watch?v=RRnmRBVdsdw', type: 'Video', label: 'FW Video #20' },
    ];

    function getDayIndex() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const dayOfYear = Math.floor((now - start) / 86400000);
        return dayOfYear % 20;
    }

    function getEmbedUrl(url) {
        // Shorts
        const shortsMatch = url.match(/shorts\/([a-zA-Z0-9_-]+)/);
        if (shortsMatch) return `https://www.youtube.com/embed/${shortsMatch[1]}?autoplay=1&rel=0`;
        // Regular watch
        const watchMatch = url.match(/[?&]v=([a-zA-Z0-9_-]+)/);
        if (watchMatch) return `https://www.youtube.com/embed/${watchMatch[1]}?autoplay=1&rel=0`;
        return url;
    }

    function loadVideo(idx) {
        const item = YOUTUBE_LINKS[idx];
        const isShort = item.type === 'Short';
        const wrapper = document.getElementById('videoWrapper');
        const frame = document.getElementById('videoFrame');

        wrapper.className = 'video-wrapper ' + (isShort ? 'shorts' : 'regular');
        frame.src = getEmbedUrl(item.url);

        document.getElementById('videoTitle').textContent = item.label;
        document.getElementById('videoType').textContent = isShort ? 'YouTube Short' : 'YouTube Video';

        // Highlight active in playlist
        document.querySelectorAll('.playlist-item').forEach((el, i) => {
            el.classList.toggle('active', i === idx);
        });
    }

    function init() {
        const todayIdx = getDayIndex();

        // Day label
        document.getElementById('dayPill').textContent = `Day ${todayIdx + 1}`;
        document.getElementById('dayText').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
        document.getElementById('videoDate').textContent = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

        // Build playlist
        const playlist = document.getElementById('playlist');
        YOUTUBE_LINKS.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'playlist-item' + (i === todayIdx ? ' active' : '');
            el.innerHTML = `
                <div class="playlist-num">${i + 1}</div>
                <div class="playlist-item-info">
                    <div class="playlist-item-title">${item.label}</div>
                    <div class="playlist-item-type"><i class="fab fa-youtube" style="color:#ef4444;margin-right:4px;"></i>${item.type}</div>
                </div>
                ${i === todayIdx ? '<span class="playlist-today">TODAY</span>' : ''}
            `;
            el.addEventListener('click', () => loadVideo(i));
            playlist.appendChild(el);
        });

        // Load today's video
        loadVideo(todayIdx);
    }

    init();
</script>
