<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video – FW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            overflow-x: hidden;
        }
        .container {
            width: 100%; max-width: 480px;
            margin: 0 auto;
            background-color: #0f0f0f;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        /* TOP NAV */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0;
            max-width: 480px; margin: 0 auto; width: 100%;
            height: 60px;
            background: rgba(15,15,15,0.95);
            backdrop-filter: blur(12px);
            display: flex; align-items: center;
            padding: 0 16px; gap: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none; color: #fff;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
            transition: background 0.2s;
            text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .nav-title {
            font-size: 17px; font-weight: 700;
            flex: 1;
        }
        .nav-badge {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff; font-size: 11px; font-weight: 700;
            padding: 4px 10px; border-radius: 20px;
            letter-spacing: 0.5px;
        }

        /* MAIN */
        .main-content {
            margin-top: 60px;
            padding: 20px 16px 100px;
            flex: 1;
        }

        /* DAY LABEL */
        .day-label {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px;
        }
        .day-pill {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff; font-size: 12px; font-weight: 700;
            padding: 5px 14px; border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .day-text {
            font-size: 13px; color: rgba(255,255,255,0.5);
        }

        /* VIDEO PLAYER WRAPPER */
        .video-wrapper {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #1a1a1a;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            position: relative;
        }
        .video-wrapper iframe {
            width: 100%;
            display: block;
            border: none;
        }
        /* For shorts: 9:16 aspect, for regular: 16:9 */
        .video-wrapper.shorts { aspect-ratio: 9/16; }
        .video-wrapper.regular { aspect-ratio: 16/9; }
        .video-wrapper iframe { height: 100%; }

        /* VIDEO INFO */
        .video-info {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
        }
        .video-info-title {
            font-size: 15px; font-weight: 700;
            margin-bottom: 6px; color: #fff;
        }
        .video-info-sub {
            font-size: 13px; color: rgba(255,255,255,0.45);
            display: flex; align-items: center; gap: 6px;
        }

        /* RECYCLE NOTICE */
        .recycle-notice {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px;
        }
        .recycle-icon { font-size: 22px; }
        .recycle-text { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.5; }
        .recycle-text strong { color: #fff; }

        /* PLAYLIST SECTION */
        .section-title {
            font-size: 14px; font-weight: 700;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 14px;
        }
        .playlist {
            display: flex; flex-direction: column; gap: 10px;
        }
        .playlist-item {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 14px 16px;
            display: flex; align-items: center; gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1.5px solid transparent;
            text-decoration: none;
        }
        .playlist-item:hover, .playlist-item.active {
            background: #222;
            border-color: #ef4444;
        }
        .playlist-num {
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.6);
            flex-shrink: 0;
        }
        .playlist-item.active .playlist-num {
            background: #ef4444; color: #fff;
        }
        .playlist-item-info { flex: 1; }
        .playlist-item-title {
            font-size: 13px; font-weight: 600; color: #fff;
            margin-bottom: 3px;
        }
        .playlist-item-type {
            font-size: 11px; color: rgba(255,255,255,0.4);
        }
        .playlist-today {
            font-size: 10px; font-weight: 700;
            background: #ef4444; color: #fff;
            padding: 2px 8px; border-radius: 10px;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            max-width: 480px; margin: 0 auto;
            height: 72px;
            background: rgba(15,15,15,0.97);
            backdrop-filter: blur(12px);
            display: flex; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 4px; text-decoration: none;
            color: rgba(255,255,255,0.4);
            font-size: 10px; font-weight: 500;
            transition: color 0.2s;
            padding: 8px 0;
        }
        .nav-item.active { color: #ef4444; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>
<div class="container">

    <!-- TOP NAV -->
    <nav class="top-nav">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="nav-title">🎬 FW Video</div>
        <span class="nav-badge">LIVE</span>
    </nav>

    <!-- MAIN -->
    <div class="main-content">

        <div class="day-label">
            <span class="day-pill" id="dayPill">Day 1</span>
            <span class="day-text" id="dayText">Today's featured video</span>
        </div>

        <!-- EMBEDDED VIDEO -->
        <div class="video-wrapper" id="videoWrapper">
            <iframe id="videoFrame"
                src=""
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
        </div>

        <!-- VIDEO INFO -->
        <div class="video-info">
            <div class="video-info-title" id="videoTitle">Loading today's video…</div>
            <div class="video-info-sub">
                <i class="fab fa-youtube" style="color:#ef4444;"></i>
                <span id="videoType">YouTube</span>
                &nbsp;·&nbsp;
                <span id="videoDate"></span>
            </div>
        </div>

        <!-- RECYCLE NOTICE -->
        <div class="recycle-notice">
            <span class="recycle-icon">🔄</span>
            <div class="recycle-text">
                <strong>Daily Rotation Active</strong><br>
                New video every day. After 20 days, the playlist recycles automatically.
            </div>
        </div>

        <!-- PLAYLIST -->
        <div class="section-title">All 20 Videos</div>
        <div class="playlist" id="playlist"></div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <div class="nav-icon"><i class="fas fa-home"></i></div>
            <span>Home</span>
        </a>
        <a href="wish-hub.html" class="nav-item">
            <div class="nav-icon"><i class="fas fa-star"></i></div>
            <span>Wish Hub</span>
        </a>
        <a href="earn.html" class="nav-item">
            <div class="nav-icon"><i class="fas fa-coins"></i></div>
            <span>Earn</span>
        </a>
        <a href="video.html" class="nav-item active">
            <div class="nav-icon"><i class="fas fa-play"></i></div>
            <span>Video</span>
        </a>
        <a href="audio.html" class="nav-item">
            <div class="nav-icon"><i class="fas fa-headphones"></i></div>
            <span>Audio</span>
        </a>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
    const YOUTUBE_LINKS = [
        { url: 'https://www.youtube.com/shorts/P0GIv8x2ofE',  type: 'Short', label: 'FW Short #1' },
        { url: 'https://www.youtube.com/shorts/8sFJsjIUUQE',  type: 'Short', label: 'FW Short #2' },
        { url: 'https://www.youtube.com/shorts/6ENVSeme2H8',  type: 'Short', label: 'FW Short #3' },
        { url: 'https://www.youtube.com/shorts/h1e02qDMya8',  type: 'Short', label: 'FW Short #4' },
        { url: 'https://www.youtube.com/watch?v=pKBF2AzNjA4', type: 'Video', label: 'FW Video #5' },
        { url: 'https://www.youtube.com/shorts/aNf9ErWc4oI',  type: 'Short', label: 'FW Short #6' },
        { url: 'https://www.youtube.com/shorts/tldanEqkb2Y',  type: 'Short', label: 'FW Short #7' },
        { url: 'https://www.youtube.com/shorts/j-GTdLI4Zfc',  type: 'Short', label: 'FW Short #8' },
        { url: 'https://www.youtube.com/watch?v=ZU0f8_C5Pm0', type: 'Video', label: 'FW Video #9' },
        { url: 'https://www.youtube.com/shorts/IhOmjtI7IWY',  type: 'Short', label: 'FW Short #10' },
        { url: 'https://www.youtube.com/shorts/VHIMPwhFn1Q',  type: 'Short', label: 'FW Short #11' },
        { url: 'https://www.youtube.com/shorts/JEHtUnORZKo',  type: 'Short', label: 'FW Short #12' },
        { url: 'https://www.youtube.com/watch?v=U3h1jSgVChc', type: 'Video', label: 'FW Video #13' },
        { url: 'https://www.youtube.com/shorts/CqucCRWeguc',  type: 'Short', label: 'FW Short #14' },
        { url: 'https://www.youtube.com/watch?v=oeqwB8YXHDA', type: 'Video', label: 'FW Video #15' },
        { url: 'https://www.youtube.com/watch?v=uSsHQzveObo', type: 'Video', label: 'FW Video #16' },
        { url: 'https://www.youtube.com/watch?v=R1BHj1eXxRA', type: 'Video', label: 'FW Video #17' },
        { url: 'https://www.youtube.com/watch?v=8Jg3VlxsVqg', type: 'Video', label: 'FW Video #18' },
        { url: 'https://www.youtube.com/watch?v=TgarwUxpem4', type: 'Video', label: 'FW Video #19' },
        { url: 'https://www.youtube.com/watch?v=RRnmRBVdsdw', type: 'Video', label: 'FW Video #20' },
    ];

    const VIDEO_EARN_AMOUNT = 1000;
    let currentUserId = null;
    let taskAlreadyDone = false;
    let watchTimer = null;
    let watchSeconds = 0;
    const WATCH_REQUIRED_SECONDS = 30; // require 30s watch before claim button enables

    function todayStr() { return new Date().toISOString().slice(0,10); }
    function isWithin24h(iso) { return iso && (Date.now() - new Date(iso).getTime()) < 86400000; }
    function fmt(n) { return '₦' + Number(n||0).toLocaleString('en-NG',{minimumFractionDigits:2,maximumFractionDigits:2}); }

    function showToast(msg, type='success') {
        let c = document.getElementById('videoToastContainer');
        if(!c) {
            c = document.createElement('div');
            c.id = 'videoToastContainer';
            c.style.cssText = 'position:fixed;top:70px;right:14px;z-index:9999;max-width:300px;';
            document.body.appendChild(c);
        }
        const t = document.createElement('div');
        const color = type==='success' ? '#10b981' : '#ef4444';
        t.style.cssText = `background:#1a1a1a;color:#fff;border-left:4px solid ${color};border-radius:10px;padding:12px 16px;margin-bottom:10px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.4);animation:slideIn 0.3s ease;`;
        t.textContent = msg;
        c.appendChild(t);
        setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 4000);
    }

    function getDayIndex() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const dayOfYear = Math.floor((now - start) / 86400000);
        return dayOfYear % 20;
    }

    function getEmbedUrl(url) {
        const shortsMatch = url.match(/shorts\/([a-zA-Z0-9_-]+)/);
        if (shortsMatch) return `https://www.youtube.com/embed/${shortsMatch[1]}?autoplay=1&rel=0&enablejsapi=1`;
        const watchMatch = url.match(/[?&]v=([a-zA-Z0-9_-]+)/);
        if (watchMatch) return `https://www.youtube.com/embed/${watchMatch[1]}?autoplay=1&rel=0&enablejsapi=1`;
        return url;
    }

    function startWatchTimer() {
        if(watchTimer) return;
        watchTimer = setInterval(() => {
            watchSeconds++;
            updateClaimButton();
        }, 1000);
    }

    function updateClaimButton() {
        const btn = document.getElementById('claimBtn');
        if(!btn || taskAlreadyDone) return;
        const remaining = Math.max(0, WATCH_REQUIRED_SECONDS - watchSeconds);
        if(remaining > 0) {
            btn.textContent = `⏳ Watch for ${remaining}s more to claim...`;
            btn.disabled = true;
        } else {
            btn.textContent = `✅ Completed — Claim ${fmt(VIDEO_EARN_AMOUNT)}`;
            btn.disabled = false;
            btn.style.background = 'linear-gradient(135deg,#10b981,#059669)';
            if(watchTimer) { clearInterval(watchTimer); watchTimer = null; }
        }
    }

    function showEarnPanel(alreadyDone, completedAt) {
        let panel = document.getElementById('earnPanel');
        if(!panel) {
            panel = document.createElement('div');
            panel.id = 'earnPanel';
            panel.style.cssText = 'background:#1a1a1a;border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.1);';
            const mainContent = document.querySelector('.main-content');
            const videoWrapper = document.getElementById('videoWrapper');
            mainContent.insertBefore(panel, videoWrapper.nextSibling.nextSibling); // after video info
        }

        if(alreadyDone) {
            // Show 24h countdown
            taskAlreadyDone = true;
            const completedTime = new Date(completedAt).getTime();
            const unlockTime = completedTime + 86400000;

            function renderCooldown() {
                const diff = Math.max(0, Math.floor((unlockTime - Date.now()) / 1000));
                const h = String(Math.floor(diff/3600)).padStart(2,'0');
                const m = String(Math.floor((diff%3600)/60)).padStart(2,'0');
                const s = String(diff%60).padStart(2,'0');
                panel.innerHTML = `
                    <div style="text-align:center;">
                        <div style="font-size:32px;margin-bottom:8px;">✅</div>
                        <div style="font-size:16px;font-weight:700;color:#10b981;margin-bottom:6px;">Completed!</div>
                        <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:14px;">You earned ${fmt(VIDEO_EARN_AMOUNT)} for watching today's video.</div>
                        <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:14px;">
                            <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px;">⏱ Next video unlocks in</div>
                            <div id="videoCountdown" style="font-size:22px;font-weight:800;color:#ef4444;font-variant-numeric:tabular-nums;">${diff===0?'Unlocked!':h+':'+m+':'+s}</div>
                        </div>
                        <a href="earn.html" style="display:block;margin-top:14px;background:rgba(255,255,255,0.08);color:#fff;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:600;text-decoration:none;text-align:center;">← Back to Earn</a>
                    </div>`;
                if(diff > 0) setTimeout(()=>{ const el=document.getElementById('videoCountdown'); if(el) renderCooldown(); }, 1000);
            }
            renderCooldown();
        } else {
            // Show claim button
            panel.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
                    <div>
                        <div style="font-size:13px;font-weight:700;color:#fff;">🎬 Watch & Earn</div>
                        <div style="font-size:12px;color:rgba(255,255,255,0.5);">Watch today's video to earn</div>
                    </div>
                    <div style="font-size:20px;font-weight:800;color:#f59e0b;">${fmt(VIDEO_EARN_AMOUNT)}</div>
                </div>
                <button id="claimBtn" disabled
                    style="width:100%;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);border:none;border-radius:10px;padding:14px;font-size:13px;font-weight:600;cursor:not-allowed;font-family:inherit;transition:all 0.3s;">
                    ⏳ Watch for ${WATCH_REQUIRED_SECONDS}s more to claim...
                </button>
                <div style="margin-top:10px;font-size:11px;color:rgba(255,255,255,0.35);text-align:center;">Reward is added automatically after watching</div>`;

            // Start watching when video loads
            document.getElementById('videoFrame').addEventListener('load', () => {
                startWatchTimer();
            });
            // Also start on click/interaction
            document.getElementById('videoWrapper').addEventListener('click', () => {
                startWatchTimer();
            });
            // Start immediately in case iframe already loaded
            setTimeout(startWatchTimer, 2000);

            document.getElementById('claimBtn').addEventListener('click', claimVideoEarning);
        }
    }

    async function claimVideoEarning() {
        const btn = document.getElementById('claimBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Processing...';

        try {
            // Check not already done
            const since24h = new Date(Date.now() - 86400000).toISOString();
            const {data:ex} = await _supabase.from('daily_completions').select('id')
                .eq('user_id', currentUserId).eq('task_type','daily_video').gte('created_at',since24h).maybeSingle();
            if(ex) {
                showToast('Already claimed today!');
                showEarnPanel(true, ex.created_at || new Date().toISOString());
                return;
            }

            const now = new Date().toISOString();
            // Insert completion record
            await _supabase.from('daily_completions').insert({
                user_id: currentUserId, task_type: 'daily_video',
                completed_date: todayStr(), created_at: now
            });
            // Insert transaction
            await _supabase.from('transactions').insert({
                user_id: currentUserId, type: 'daily_task',
                description: 'Daily reward: Video watch', amount: VIDEO_EARN_AMOUNT, created_at: now
            });
            // Update wallet
            const {data:w} = await _supabase.from('wallets').select('task_earnings').eq('user_id',currentUserId).maybeSingle();
            await _supabase.from('wallets').upsert({
                user_id: currentUserId,
                task_earnings: (w?.task_earnings||0) + VIDEO_EARN_AMOUNT,
                updated_at: now
            },{onConflict:'user_id'});

            showToast(`🎉 You earned ${fmt(VIDEO_EARN_AMOUNT)} for watching!`);
            showEarnPanel(true, now);

        } catch(err) {
            console.error(err);
            btn.disabled = false;
            btn.textContent = `✅ Completed — Claim ${fmt(VIDEO_EARN_AMOUNT)}`;
            showToast('Something went wrong. Try again.', 'error');
        }
    }

    function loadVideo(idx) {
        const item = YOUTUBE_LINKS[idx];
        const isShort = item.type === 'Short';
        const wrapper = document.getElementById('videoWrapper');
        const frame = document.getElementById('videoFrame');

        wrapper.className = 'video-wrapper ' + (isShort ? 'shorts' : 'regular');
        frame.src = getEmbedUrl(item.url);

        document.getElementById('videoTitle').textContent = item.label;
        document.getElementById('videoType').textContent = isShort ? 'YouTube Short' : 'YouTube Video';

        document.querySelectorAll('.playlist-item').forEach((el, i) => {
            el.classList.toggle('active', i === idx);
        });
    }

    async function init() {
        const todayIdx = getDayIndex();

        document.getElementById('dayPill').textContent = `Day ${todayIdx + 1}`;
        document.getElementById('dayText').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
        document.getElementById('videoDate').textContent = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

        // Build playlist
        const playlist = document.getElementById('playlist');
        YOUTUBE_LINKS.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'playlist-item' + (i === todayIdx ? ' active' : '');
            el.innerHTML = `
                <div class="playlist-num">${i + 1}</div>
                <div class="playlist-item-info">
                    <div class="playlist-item-title">${item.label}</div>
                    <div class="playlist-item-type"><i class="fab fa-youtube" style="color:#ef4444;margin-right:4px;"></i>${item.type}</div>
                </div>
                ${i === todayIdx ? '<span class="playlist-today">TODAY</span>' : ''}
            `;
            el.addEventListener('click', () => loadVideo(i));
            playlist.appendChild(el);
        });

        loadVideo(todayIdx);

        // Auth & check completion
        try {
            const result = await requireAuth('approved');
            if(!result) return;
            currentUserId = result.profile.id;

            // Check 24h completion
            const since24h = new Date(Date.now() - 86400000).toISOString();
            const {data:completion} = await _supabase.from('daily_completions').select('created_at')
                .eq('user_id', currentUserId).eq('task_type','daily_video').gte('created_at',since24h)
                .order('created_at',{ascending:false}).limit(1).maybeSingle();

            if(completion) {
                showEarnPanel(true, completion.created_at);
            } else {
                showEarnPanel(false, null);
            }
        } catch(e) {
            console.error('Auth/check error:', e);
            // Show panel anyway so user can see the video
            showEarnPanel(false, null);
        }
    }

    init();
</script>
</body>
</html>
