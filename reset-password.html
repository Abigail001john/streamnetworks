<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resetting Password…</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:16px;border:1px solid rgba(255,255,255,0.2);padding:40px 30px;max-width:400px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.spinner{display:inline-block;width:48px;height:48px;border:4px solid rgba(255,255,255,0.15);border-top-color:#4fd1c5;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg);}}
h1{color:#fff;font-size:22px;font-weight:700;margin-bottom:10px;}
p{color:rgba(255,255,255,0.7);font-size:14px;line-height:1.6;margin-bottom:6px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;background:linear-gradient(135deg,#4fd1c5,#45b8ae);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;font-family:'Inter',sans-serif;margin-top:20px;transition:all 0.2s;width:100%;}
.btn:hover{transform:translateY(-2px);}
.icon{font-size:52px;margin-bottom:16px;}
</style>
</head>
<body>
<div class="card" id="card">
    <div class="spinner"></div>
    <h1>Applying your new password…</h1>
    <p>Please wait a moment.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
async function run() {
    const card = document.getElementById('card');

    try {
        // Wait for Supabase to process the token in the URL hash
        await new Promise(r => setTimeout(r, 1000));

        // Get session — Supabase auto-signs user in from the reset token in URL
        const { data: { session }, error: sessErr } = await _supabase.auth.getSession();

        if (sessErr || !session) {
            throw new Error('Reset link expired or already used. Please try forgot password again.');
        }

        // Get the new password the user typed — stored in sessionStorage
        const newPassword = sessionStorage.getItem('pendingNewPassword');

        if (!newPassword) {
            // No password in storage — show manual form instead
            showManualForm(session);
            return;
        }

        // Apply the new password
        const { error: updateErr } = await _supabase.auth.updateUser({
            password: newPassword
        });

        if (updateErr) throw updateErr;

        // Clean up
        sessionStorage.removeItem('pendingNewPassword');
        sessionStorage.removeItem('pendingEmail');

        // Sign out so user logs in fresh
        await _supabase.auth.signOut();

        // Show success
        card.innerHTML = `
            <div class="icon">🎉</div>
            <h1 style="color:#4fd1c5;">Password Updated!</h1>
            <p>Your password has been changed successfully.</p>
            <p>You can now sign in with your new password.</p>
            <a href="login.html" class="btn"><i class="fas fa-sign-in-alt"></i> Sign In Now</a>
        `;

    } catch (err) {
        card.innerHTML = `
            <div class="icon">❌</div>
            <h1 style="color:#ff6b6b;">Something Went Wrong</h1>
            <p>${err.message || 'Could not reset password.'}</p>
            <a href="login.html" class="btn"><i class="fas fa-arrow-left"></i> Back to Login</a>
        `;
    }
}

// Fallback: if no sessionStorage password, show a simple form
function showManualForm(session) {
    const card = document.getElementById('card');
    card.innerHTML = `
        <div class="icon" style="font-size:40px;">🔑</div>
        <h1>Set New Password</h1>
        <p style="margin-bottom:20px;">Enter your new password below.</p>
        <input type="password" id="np" placeholder="New password (min 6 chars)"
            style="width:100%;padding:12px 15px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:14px;font-family:Inter,sans-serif;margin-bottom:10px;">
        <input type="password" id="cp" placeholder="Confirm new password"
            style="width:100%;padding:12px 15px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:14px;font-family:Inter,sans-serif;margin-bottom:6px;">
        <p id="formErr" style="color:#ff6b6b;font-size:12px;min-height:18px;margin-bottom:10px;"></p>
        <button class="btn" onclick="applyManual()"><i class="fas fa-key"></i> Save Password</button>
    `;
}

async function applyManual() {
    const np = document.getElementById('np').value;
    const cp = document.getElementById('cp').value;
    const errEl = document.getElementById('formErr');

    if (!np || np.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; return; }
    if (np !== cp) { errEl.textContent = 'Passwords do not match'; return; }
    errEl.textContent = '';

    const btn = document.querySelector('.btn');
    btn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;margin:0;"></div> Saving…';
    btn.disabled = true;

    const { error } = await _supabase.auth.updateUser({ password: np });
    if (error) {
        errEl.textContent = error.message;
        btn.innerHTML = '<i class="fas fa-key"></i> Save Password';
        btn.disabled = false;
        return;
    }

    await _supabase.auth.signOut();
    document.getElementById('card').innerHTML = `
        <div class="icon">🎉</div>
        <h1 style="color:#4fd1c5;">Password Updated!</h1>
        <p>You can now sign in with your new password.</p>
        <a href="login.html" class="btn"><i class="fas fa-sign-in-alt"></i> Sign In Now</a>
    `;
}

run();
</script>
</body>
</html>
